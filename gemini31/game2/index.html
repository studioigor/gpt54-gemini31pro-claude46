<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Бумажный Кораблик</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <style>
        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #eaddcf;
            /* Paper-like */
            display: flex;
            justify-content: center;
            font-family: 'Georgia', serif;
            touch-action: none;
            /* Prevent scroll on touch */
        }

        #gameContainer {
            position: relative;
            width: 100%;
            max-width: 500px;
            height: 100%;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.1);
            background-color: #f7f1e3;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        #uiLayer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            box-sizing: border-box;
            padding: 20px;
        }

        .score-board {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 24px;
            color: #2c3e50;
            text-shadow: 0 0 5px rgba(255, 255, 255, 0.8);
            font-weight: bold;
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(247, 241, 227, 0.85);
            /* paper blur overlay */
            pointer-events: auto;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            transition: opacity 0.5s;
        }

        .hidden {
            display: none !important;
            opacity: 0;
            pointer-events: none;
        }

        h1 {
            color: #2c3e50;
            font-style: italic;
            font-size: 32px;
            margin-bottom: 20px;
        }

        p {
            color: #34495e;
            font-size: 18px;
            max-width: 80%;
            line-height: 1.4;
        }

        button {
            margin-top: 30px;
            padding: 12px 40px;
            font-size: 20px;
            font-family: 'Georgia', serif;
            font-style: italic;
            background: transparent;
            border: 2px solid #7f8c8d;
            border-radius: 4px;
            color: #2c3e50;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: all 0.3s;
            background-color: #fffaf0;
        }

        button:before {
            content: '';
            position: absolute;
            top: -2px;
            right: -2px;
            border-width: 0 20px 20px 0;
            border-style: solid;
            border-color: #bdc3c7 #f7f1e3;
            display: block;
            width: 0;
            transition: border-color 0.3s;
        }

        button:hover {
            background-color: #eaddcf;
        }

        #flashOverlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: white;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.1s;
        }
    </style>
</head>

<body>

    <div id="gameContainer">
        <canvas id="gameCanvas"></canvas>

        <div id="uiLayer">
            <div class="score-board">
                м: <span id="scoreVal">0</span>
            </div>
        </div>

        <div id="flashOverlay"></div>

        <div id="startScreen" class="overlay">
            <h1>Бумажный Кораблик</h1>
            <p>Кликай и води курсором (или пальцем), чтобы плыть по ручью.</p>
            <p>Уклоняйся от препятствий и собирай журавликов!</p>
            <button id="startBtn">Поплыли</button>
        </div>

        <div id="gameOverScreen" class="overlay hidden">
            <h1>Кораблик размок...</h1>
            <p id="gameOverText">Кораблик проплыл 0 метров.</p>
            <p id="highScoreText" style="font-size: 14px; opacity: 0.8;"></p>
            <button id="restartBtn">Ещё раз</button>
        </div>
    </div>

    <script>
        /**
         * AUDIO MANAGER
         */
        const AudioSys = {
            initialized: false,
            bgmSynth: null,
            rainNoise: null,
            rainFilter: null,
            musicSequence: null,
            currentPhase: 0,

            async init() {
                if (this.initialized) return;
                await Tone.start();

                // Ambient Noise (Rain/Water)
                this.rainNoise = new Tone.Noise("pink");
                this.rainFilter = new Tone.Filter(400, "lowpass").toDestination();
                this.rainNoise.connect(this.rainFilter);
                this.rainNoise.volume.value = -15;
                this.rainNoise.start();

                // Music Synth
                this.bgmSynth = new Tone.PolySynth(Tone.Synth, {
                    oscillator: { type: "sine" },
                    envelope: { attack: 0.1, decay: 0.2, sustain: 0.5, release: 2 }
                }).toDestination();
                this.bgmSynth.volume.value = -10;

                // Simple loop
                const notes = ["C4", "E4", "G4", "A4", "C5", "A4", "G4", "E4"];
                let step = 0;
                this.musicSequence = new Tone.Loop(time => {
                    if (this.currentPhase >= 2 && step % 2 === 0) {
                        // Add some bass or extra notes at phase 2+
                        this.bgmSynth.triggerAttackRelease("C3", "8n", time, 0.4);
                    }
                    if (this.currentPhase >= 3) {
                        // faster pattern or arp
                        this.bgmSynth.triggerAttackRelease(notes[(step * 2) % notes.length], "16n", time, 0.3);
                    } else {
                        this.bgmSynth.triggerAttackRelease(notes[step % notes.length], "8n", time, 0.5);
                    }
                    step++;
                }, "8n");

                Tone.Transport.bpm.value = 90;
                Tone.Transport.start();
                this.musicSequence.start(0);

                this.initialized = true;
            },

            setPhase(phase) {
                this.currentPhase = phase;
                if (this.rainFilter) {
                    // open filter as phase increases
                    this.rainFilter.frequency.rampTo(400 + phase * 400, 2);
                    this.rainNoise.volume.rampTo(-15 + phase * 2, 2);
                }
                if (this.currentPhase >= 3) {
                    Tone.Transport.bpm.rampTo(120, 5);
                } else if (this.currentPhase >= 4) {
                    Tone.Transport.bpm.rampTo(140, 5);
                }
            },

            stop() {
                if (this.rainNoise) {
                    this.rainNoise.volume.rampTo(-40, 1);
                    setTimeout(() => this.rainNoise.stop(), 1000);
                }
                if (this.musicSequence) this.musicSequence.stop();
                Tone.Transport.stop();
                this.initialized = false;
            },

            playSFX(type) {
                if (!this.initialized) return;
                const now = Tone.now();
                if (type === 'star') {
                    const synth = new Tone.Synth({ oscillator: { type: "fmsine" }, envelope: { attack: 0.01, decay: 0.2, sustain: 0, release: 0.1 } }).toDestination();
                    synth.volume.value = -10;
                    synth.triggerAttackRelease("E6", "16n", now);
                } else if (type === 'crane') {
                    const synth = new Tone.PolySynth(Tone.Synth).toDestination();
                    synth.volume.value = -8;
                    synth.triggerAttackRelease(["C5", "E5", "G5"], "8n", now);
                } else if (type === 'hit') {
                    const memSynth = new Tone.MembraneSynth().toDestination();
                    memSynth.volume.value = -5;
                    memSynth.triggerAttackRelease("C1", "8n", now);
                    if (navigator.vibrate) navigator.vibrate(50);
                } else if (type === 'frog') {
                    const synth = new Tone.Synth({ oscillator: { type: "square" }, envelope: { attack: 0.05, decay: 0.1, sustain: 0, release: 0.1 } }).toDestination();
                    synth.volume.value = -12;
                    synth.triggerAttackRelease("G4", "8n", now);
                    synth.triggerAttackRelease("B4", "8n", now + 0.1);
                }
            }
        };

        /**
         * MATH & UTILS
         */
        const Utils = {
            lerp: (a, b, t) => a + (b - a) * t,
            clamp: (val, min, max) => Math.max(min, Math.min(max, val)),
            dist: (x1, y1, x2, y2) => Math.hypot(x2 - x1, y2 - y1),
            random: (min, max) => Math.random() * (max - min) + min,
            // Simple 1D noise based on sine waves
            noise1D: (t, seed) => {
                return Math.sin(t * 0.01 + seed) * Math.cos(t * 0.023 + seed * 2) * Math.sin(t * 0.005 - seed);
            }
        };

        /**
         * RENDERER
         */
        const Renderer = {
            ctx: null,
            width: 0,
            height: 0,
            paperTexture: null,

            init(canvas) {
                this.ctx = canvas.getContext('2d');
                this.resize(canvas);
                this.createPaperTexture();
            },

            resize(canvas) {
                const dpr = window.devicePixelRatio || 1;
                const rect = canvas.parentElement.getBoundingClientRect();
                canvas.width = rect.width * dpr;
                canvas.height = rect.height * dpr;
                this.width = canvas.width;
                this.height = canvas.height;
                this.ctx.scale(dpr, dpr);
                // Normalize coordinates to logic space width=500, height=proportional
                this.logicWidth = canvas.clientWidth;
                this.logicHeight = canvas.clientHeight;
                this.createPaperTexture();
            },

            createPaperTexture() {
                if (!this.width || !this.height) return;
                const offCanvas = document.createElement('canvas');
                offCanvas.width = this.width;
                offCanvas.height = this.height;
                const ctx = offCanvas.getContext('2d');

                ctx.fillStyle = '#f7f1e3';
                ctx.fillRect(0, 0, offCanvas.width, offCanvas.height);

                // noise
                const imgData = ctx.getImageData(0, 0, offCanvas.width, offCanvas.height);
                const data = imgData.data;
                for (let i = 0; i < data.length; i += 4) {
                    let val = Math.random() * 15;
                    data[i] = Math.max(0, data[i] - val);
                    data[i + 1] = Math.max(0, data[i + 1] - val);
                    data[i + 2] = Math.max(0, data[i + 2] - val);
                }
                ctx.putImageData(imgData, 0, 0);
                this.paperTexture = offCanvas;
            },

            drawBackground() {
                if (this.paperTexture) {
                    this.ctx.drawImage(this.paperTexture, 0, 0, this.logicWidth, this.logicHeight);
                } else {
                    this.ctx.fillStyle = '#f7f1e3';
                    this.ctx.fillRect(0, 0, this.logicWidth, this.logicHeight);
                }
            },

            drawWatercolorCircle(x, y, r, color, alpha = 1) {
                this.ctx.save();
                // Layer 1: shadow / blur
                this.ctx.globalAlpha = 0.2 * alpha;
                this.ctx.fillStyle = color;
                this.ctx.shadowColor = color;
                this.ctx.shadowBlur = r * 0.5;
                this.ctx.beginPath();
                this.ctx.arc(x + r * 0.1, y + r * 0.1, r * 1.1, 0, Math.PI * 2);
                this.ctx.fill();

                // Layer 2: base
                this.ctx.globalAlpha = 0.6 * alpha;
                this.ctx.shadowBlur = 0;
                this.ctx.beginPath();
                this.ctx.arc(x, y, r, 0, Math.PI * 2);
                this.ctx.fill();

                // Layer 3: core
                this.ctx.globalAlpha = 0.9 * alpha;
                this.ctx.beginPath();
                this.ctx.arc(x - r * 0.1, y - r * 0.1, r * 0.8, 0, Math.PI * 2);
                this.ctx.fill();
                this.ctx.restore();
            },

            drawWatercolorPoly(points, color, alpha = 1) {
                this.ctx.save();

                // shadow
                this.ctx.globalAlpha = 0.3 * alpha;
                this.ctx.fillStyle = color;
                this.ctx.shadowColor = color;
                this.ctx.shadowBlur = 10;
                this.ctx.beginPath();
                let p0 = points[0];
                this.ctx.moveTo(p0.x, p0.y);
                for (let i = 1; i < points.length; i++) this.ctx.lineTo(points[i].x, points[i].y);
                this.ctx.closePath();
                this.ctx.fill();

                // base
                this.ctx.globalAlpha = 0.8 * alpha;
                this.ctx.shadowBlur = 0;
                this.ctx.beginPath();
                this.ctx.moveTo(p0.x, p0.y);
                for (let i = 1; i < points.length; i++) this.ctx.lineTo(points[i].x, points[i].y);
                this.ctx.closePath();
                this.ctx.fill();

                this.ctx.restore();
            }
        };

        /**
         * RIVER
         */
        class River {
            constructor() {
                this.baseWidthPhase = 0.4;
                this.color = [135, 206, 235]; // Light blue
                this.scroll = 0;
                this.ripples = [];
                this.speedConfig = 100; // base logic pixels per second
                this.phaseColors = {
                    0: [135, 206, 235], // phase 1: pavement puddle
                    1: [100, 180, 200], // phase 2: ditch
                    2: [70, 160, 180],  // phase 3: park stream
                    3: [30, 80, 140],   // phase 4: river
                    4: [10, 40, 90]     // phase 4+: deep river
                };
            }

            update(dt, phase, speedMult) {
                this.scroll += this.speedConfig * speedMult * dt;

                // Target values based on phase
                let targetWidth = 0.4 + Math.min(phase * 0.15, 0.5); // max 0.9 width
                this.baseWidthPhase = Utils.lerp(this.baseWidthPhase, targetWidth, dt * 0.2);

                // Lerp colors
                let targetColor = this.phaseColors[Math.min(phase, 4)] || this.phaseColors[4];
                this.color[0] = Utils.lerp(this.color[0], targetColor[0], dt * 0.5);
                this.color[1] = Utils.lerp(this.color[1], targetColor[1], dt * 0.5);
                this.color[2] = Utils.lerp(this.color[2], targetColor[2], dt * 0.5);

                // Ripples
                if (Math.random() < 0.1 * (phase + 1)) {
                    this.ripples.push({
                        x: Utils.random(0, Renderer.logicWidth),
                        y: -10,
                        rX: Utils.random(5, 30),
                        rY: Utils.random(2, 8),
                        alpha: Utils.random(0.3, 0.6),
                        speed: Utils.random(1.2, 1.8) * speedMult * this.speedConfig
                    });
                }

                for (let i = this.ripples.length - 1; i >= 0; i--) {
                    let r = this.ripples[i];
                    r.y += r.speed * dt;
                    r.alpha -= dt * 0.2;
                    if (r.alpha <= 0 || r.y > Renderer.logicHeight + 50) {
                        this.ripples.splice(i, 1);
                    }
                }
            }

            draw(ctx) {
                const H = Renderer.logicHeight;
                const W = Renderer.logicWidth;
                const segmentCount = 20;
                const segH = H / segmentCount;

                // Draw River Body
                ctx.save();
                ctx.fillStyle = `rgba(${Math.floor(this.color[0])}, ${Math.floor(this.color[1])}, ${Math.floor(this.color[2])}, 0.5)`;
                ctx.shadowColor = `rgb(${Math.floor(this.color[0])}, ${Math.floor(this.color[1])}, ${Math.floor(this.color[2])})`;
                ctx.shadowBlur = 15;

                ctx.beginPath();
                let leftPoints = [];
                let rightPoints = [];

                for (let i = -1; i <= segmentCount + 1; i++) {
                    let y = i * segH;
                    let scrY = y - this.scroll;
                    // Center oscillation
                    let cx = W * 0.5 + Utils.noise1D(scrY, 123) * W * 0.15;
                    let lw = W * this.baseWidthPhase;

                    // Noise on banks
                    let bankNoiseL = Utils.noise1D(scrY, 456) * W * 0.05;
                    let bankNoiseR = Utils.noise1D(scrY, 789) * W * 0.05;

                    let lx = cx - lw / 2 + bankNoiseL;
                    let rx = cx + lw / 2 + bankNoiseR;

                    leftPoints.push({ x: Math.max(0, lx), y });
                    rightPoints.unshift({ x: Math.min(W, rx), y });
                }

                if (leftPoints.length > 0) ctx.moveTo(leftPoints[0].x, leftPoints[0].y);
                for (let p of leftPoints) ctx.lineTo(p.x, p.y);
                for (let p of rightPoints) ctx.lineTo(p.x, p.y);
                ctx.closePath();
                ctx.fill();

                // Bank distinct lines
                ctx.strokeStyle = `rgba(${Math.floor(this.color[0] * 0.5)}, ${Math.floor(this.color[1] * 0.5)}, ${Math.floor(this.color[2] * 0.5)}, 0.4)`;
                ctx.lineWidth = 4;
                ctx.beginPath();
                for (let i = 0; i < leftPoints.length; i++) {
                    if (i === 0) ctx.moveTo(leftPoints[i].x, leftPoints[i].y);
                    else ctx.lineTo(leftPoints[i].x, leftPoints[i].y);
                }
                ctx.stroke();

                ctx.beginPath();
                for (let i = 0; i < rightPoints.length; i++) {
                    if (i === 0) ctx.moveTo(rightPoints[i].x, rightPoints[i].y);
                    else ctx.lineTo(rightPoints[i].x, rightPoints[i].y);
                }
                ctx.stroke();
                ctx.restore();

                // Draw Ripples
                ctx.save();
                for (let r of this.ripples) {
                    ctx.beginPath();
                    ctx.ellipse(r.x, r.y, r.rX, r.rY, 0, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(255, 255, 255, ${r.alpha})`;
                    ctx.fill();
                }
                ctx.restore();
            }

            contains(x, y) {
                // approx check for river boundaries
                const W = Renderer.logicWidth;
                let scrY = y - this.scroll;
                let cx = W * 0.5 + Utils.noise1D(scrY, 123) * W * 0.15;
                let lw = W * this.baseWidthPhase;
                let bankNoiseL = Utils.noise1D(scrY, 456) * W * 0.05;
                let bankNoiseR = Utils.noise1D(scrY, 789) * W * 0.05;
                let lx = cx - lw / 2 + bankNoiseL;
                let rx = cx + lw / 2 + bankNoiseR;

                // we add margin to not be too strict
                return (x > lx - 10 && x < rx + 10);
            }

            getCenterAt(y) {
                let scrY = y - this.scroll;
                const W = Renderer.logicWidth;
                return W * 0.5 + Utils.noise1D(scrY, 123) * W * 0.15;
            }
        }

        /**
         * BOAT
         */
        class Boat {
            constructor() {
                this.x = 0;
                this.y = 0;
                this.targetX = this.x;
                this.angle = 0;
                this.dryness = 3; // 3=max, 0=dead
                this.shield = 0; // shield timer
                this.immune = 0;
                this.radius = 15; // collision radius
            }

            reset() {
                if (Renderer.logicWidth) {
                    this.x = Renderer.logicWidth / 2;
                    this.y = Renderer.logicHeight * 0.7;
                }
                this.targetX = this.x;
                this.dryness = 3;
                this.angle = 0;
                this.shield = 0;
                this.immune = 0;
            }

            update(dt) {
                // move to target horizontal
                this.x = Utils.lerp(this.x, this.targetX, dt * 5);
                this.x = Utils.clamp(this.x, 15, Renderer.logicWidth - 15);

                // Sway angle based on movement speed + sine wave
                let moveSway = (this.targetX - this.x) * 0.02;
                let idleSway = Math.sin(Date.now() * 0.003) * 0.05;
                this.angle = Utils.lerp(this.angle, moveSway + idleSway, dt * 5);

                if (this.immune > 0) this.immune -= dt;
                if (this.shield > 0) this.shield -= dt;
            }

            damage() {
                if (this.immune > 0) return false;
                if (this.shield > 0) {
                    this.shield = 0;
                    this.immune = 1; // 1s immunity
                    return false;
                }
                this.dryness--;
                this.immune = 1.0;
                return true;
            }

            heal() {
                if (this.dryness < 3) this.dryness++;
            }

            draw(ctx) {
                if (this.dryness <= 0) return; // Dead

                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.angle);

                // Immunity flash
                if (this.immune > 0 && Math.floor(Date.now() / 100) % 2 === 0) {
                    ctx.globalAlpha = 0.5;
                }

                // Shield
                if (this.shield > 0) {
                    ctx.beginPath();
                    ctx.arc(0, 0, this.radius + 10, 0, Math.PI * 2);
                    ctx.fillStyle = 'rgba(46, 204, 113, 0.3)';
                    ctx.fill();
                    ctx.strokeStyle = 'rgba(46, 204, 113, 0.8)';
                    ctx.lineWidth = 2;
                    ctx.stroke();
                }

                // Color based on dryness
                let baseAlpha = this.dryness === 3 ? 1 : this.dryness === 2 ? 0.8 : 0.5;
                let darkColor = this.dryness === 3 ? '#fff' : this.dryness === 2 ? '#e0e0e0' : '#b0b0b0';

                ctx.globalAlpha *= baseAlpha;

                // shadow
                ctx.shadowColor = 'rgba(0,0,0,0.3)';
                ctx.shadowBlur = 10;
                ctx.shadowOffsetY = 5;

                // Base hull
                ctx.fillStyle = darkColor;
                ctx.beginPath();
                ctx.moveTo(0, -20);    // tip
                ctx.lineTo(15, 10);    // right
                ctx.lineTo(0, 5);      // bottom center
                ctx.lineTo(-15, 10);   // left
                ctx.closePath();
                ctx.fill();

                // Sail
                ctx.shadowBlur = 0;
                ctx.shadowOffsetY = 0;
                ctx.fillStyle = '#f0f0f0';
                ctx.beginPath();
                ctx.moveTo(0, -5);     // fold tip
                ctx.lineTo(12, 8);
                ctx.lineTo(0, 15);
                ctx.closePath();
                ctx.fill();

                // Lines (folds)
                ctx.strokeStyle = 'rgba(0,0,0,0.2)';
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.moveTo(0, -20);
                ctx.lineTo(0, 15);
                ctx.moveTo(0, 5);
                ctx.lineTo(15, 10);
                ctx.moveTo(0, 5);
                ctx.lineTo(-15, 10);
                ctx.stroke();

                ctx.restore();
            }
        }

        /**
         * ENTITY MANAGER (Obstacles & Collectibles)
         */
        class EntityManager {
            constructor() {
                this.entities = [];
                this.particles = [];
                this.spawnTimer = 0;
            }

            reset() {
                this.entities = [];
                this.particles = [];
                this.spawnTimer = 0;
            }

            update(dt, phase, speedMult, river, boat) {
                let baseSpeed = river.speedConfig * speedMult;

                // Spawn logic
                this.spawnTimer -= dt;
                if (this.spawnTimer <= 0) {
                    // Spawn interval decreases as phase increases
                    this.spawnTimer = Utils.random(0.5, 1.5) / Math.max(1, phase * 0.5);
                    this.spawnEntity(phase, river);
                }

                // Update entities
                for (let i = this.entities.length - 1; i >= 0; i--) {
                    let e = this.entities[i];
                    // Entities move downwards with river speed, minus their own speed
                    e.y += (baseSpeed * e.speedMult) * dt;
                    e.time += dt;

                    // Specific logic
                    if (e.type === 'whirlpool') {
                        e.angle += dt * 2;
                        // pull boat
                        let dist = Utils.dist(e.x, e.y, boat.x, boat.y);
                        if (dist < e.radius * 3) {
                            let dirX = (e.x - boat.x) / dist;
                            boat.targetX += dirX * 50 * dt; // gravity
                        }
                    } else if (e.type === 'ink') {
                        e.visualRadius = e.radius + Math.sin(e.time * 5) * 5;
                    }

                    // Cleanup
                    if (e.y > Renderer.logicHeight + 100) {
                        this.entities.splice(i, 1);
                        continue;
                    }

                    // Collisions
                    if (boat.dryness > 0) {
                        let dist = Utils.dist(e.x, e.y, boat.x, boat.y);
                        let hitDist = e.radius + boat.radius;

                        if (e.type === 'leaf') {
                            // visual obstacle only, no collision logic needed
                        } else if (!e.collected && dist < hitDist) {
                            this.handleCollision(e, boat);
                            if (e.collectible) {
                                e.collected = true; // wait for removal
                            }
                        }
                    }
                }

                // Cleanup collected
                this.entities = this.entities.filter(e => !e.collected);

                // Update particles
                for (let i = this.particles.length - 1; i >= 0; i--) {
                    let p = this.particles[i];
                    p.x += p.vx * dt;
                    p.y += p.vy * dt;
                    p.alpha -= dt * p.fade;
                    if (p.alpha <= 0) {
                        this.particles.splice(i, 1);
                    }
                }
            }

            handleCollision(e, boat) {
                if (e.type === 'rock') {
                    if (boat.damage()) {
                        AudioSys.playSFX('hit');
                        Game.screenShake = 0.2;
                        // bounce boat
                        boat.targetX += (boat.x < e.x ? -30 : 30);
                    }
                } else if (e.type === 'ink') {
                    if (boat.damage()) {
                        AudioSys.playSFX('hit');
                        Game.screenShake = 0.3;
                        Game.triggerScreenFlash('rgba(74, 35, 90, 0.4)'); // Purple dirty flash
                    }
                    e.collected = true; // remove ink on hit
                } else if (e.type === 'crane') {
                    boat.heal();
                    AudioSys.playSFX('crane');
                    Game.createFloatingText("+HP", e.x, e.y, '#27ae60');
                } else if (e.type === 'star') {
                    Game.score += 10;
                    Game.updateScoreUI();
                    AudioSys.playSFX('star');
                    Game.createFloatingText("+10", e.x, e.y, '#f1c40f');
                } else if (e.type === 'frog') {
                    boat.shield = 5.0; // 5 sec shield
                    AudioSys.playSFX('frog');
                    Game.createFloatingText("ЩИТ", e.x, e.y, '#2ecc71');
                }
            }

            spawnEntity(phase, river) {
                let r = Math.random();
                let isCollectible = r < 0.3; // 30% bonus, 70% obst

                let cx = river.getCenterAt(-50);
                let rw = Renderer.logicWidth * river.baseWidthPhase;

                let spawnX = cx + Utils.random(-rw * 0.4, rw * 0.4);

                let obj = {
                    x: spawnX,
                    y: -50,
                    time: 0,
                    collected: false
                };

                if (isCollectible) {
                    obj.collectible = true;
                    let typeR = Math.random();
                    if (typeR < 0.6) {
                        obj.type = 'star';
                        obj.radius = 10;
                        obj.speedMult = 1.0;
                    } else if (typeR < 0.9) {
                        obj.type = 'crane';
                        obj.radius = 12;
                        obj.speedMult = 1.1; // slightly faster
                    } else {
                        obj.type = 'frog';
                        obj.radius = 15;
                        obj.speedMult = 1.0;
                    }
                } else {
                    // Obstacles
                    obj.collectible = false;
                    let typeTable = [];
                    // phase 0
                    typeTable = [{ t: 'rock', w: 100 }];
                    if (phase >= 1) typeTable.push({ t: 'ink', w: 30 });
                    if (phase >= 2) { typeTable.push({ t: 'whirlpool', w: 40 }); typeTable.push({ t: 'leaf', w: 20 }); }

                    // weighted select
                    let totalW = typeTable.reduce((sum, val) => sum + val.w, 0);
                    let roll = Utils.random(0, totalW);
                    let selectedType = 'rock';
                    let cur = 0;
                    for (let item of typeTable) {
                        cur += item.w;
                        if (roll <= cur) { selectedType = item.t; break; }
                    }

                    obj.type = selectedType;
                    if (selectedType === 'rock') {
                        obj.radius = Utils.random(15, 25);
                        obj.speedMult = 1.0;
                        obj.points = this.generateRockShape(obj.radius);
                    } else if (selectedType === 'ink') {
                        obj.radius = Utils.random(15, 20);
                        obj.visualRadius = obj.radius;
                        obj.speedMult = 0.9;
                    } else if (selectedType === 'whirlpool') {
                        obj.radius = Utils.random(25, 40);
                        obj.speedMult = 1.0;
                        obj.angle = 0;
                    } else if (selectedType === 'leaf') {
                        obj.radius = Utils.random(30, 50);
                        obj.speedMult = 1.2; // faster than water
                        obj.angle = Utils.random(0, Math.PI * 2);
                    }
                }

                this.entities.push(obj);
            }

            generateRockShape(scale) {
                let pts = [];
                let numPts = 7;
                for (let i = 0; i < numPts; i++) {
                    let a = (i / numPts) * Math.PI * 2;
                    let r = scale * Utils.random(0.8, 1.2);
                    pts.push({ x: Math.cos(a) * r, y: Math.sin(a) * r });
                }
                return pts;
            }

            spawnDeathParticles(x, y) {
                for (let i = 0; i < 30; i++) {
                    let angle = Math.random() * Math.PI * 2;
                    let speed = Utils.random(20, 100);
                    this.particles.push({
                        x: x, y: y,
                        vx: Math.cos(angle) * speed,
                        vy: Math.sin(angle) * speed,
                        r: Utils.random(2, 6),
                        alpha: 1,
                        fade: Utils.random(0.5, 1.5)
                    });
                }
            }

            draw(ctx) {
                // Sort: whirlpools first (under water), then leaves (above boat), etc.
                // Actually boat is drawn separately, so we partition entities
                // Let's just draw all non-leaves
                for (let e of this.entities) {
                    if (e.type === 'leaf') continue;
                    this.drawEntity(ctx, e);
                }

                // Draw particles
                for (let p of this.particles) {
                    ctx.fillStyle = `rgba(255, 255, 255, ${p.alpha})`;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
                    ctx.fill();
                }
            }

            drawLeaves(ctx) {
                for (let e of this.entities) {
                    if (e.type === 'leaf') this.drawEntity(ctx, e);
                }
            }

            drawEntity(ctx, e) {
                ctx.save();
                ctx.translate(e.x, e.y);

                if (e.type === 'rock') {
                    Renderer.drawWatercolorPoly(e.points, '#7f8c8d');
                } else if (e.type === 'ink') {
                    Renderer.drawWatercolorCircle(0, 0, e.visualRadius, '#4a235a');
                } else if (e.type === 'whirlpool') {
                    ctx.rotate(e.angle);
                    ctx.strokeStyle = 'rgba(52, 152, 219, 0.4)';
                    ctx.lineWidth = 3;
                    ctx.beginPath();
                    // multi-spiral
                    for (let a = 0; a < Math.PI * 4; a += 0.2) {
                        let r = (a / (Math.PI * 4)) * e.radius;
                        let px = Math.cos(a) * r;
                        let py = Math.sin(a) * r;
                        if (a === 0) ctx.moveTo(px, py);
                        else ctx.lineTo(px, py);
                    }
                    ctx.stroke();
                } else if (e.type === 'leaf') {
                    ctx.rotate(e.angle);
                    Renderer.drawWatercolorCircle(0, 0, e.radius, '#27ae60', 0.8);
                    // leaf veins
                    ctx.strokeStyle = 'rgba(0,0,0,0.2)';
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.moveTo(0, -e.radius);
                    ctx.lineTo(0, e.radius);
                    ctx.stroke();
                } else if (e.type === 'star') {
                    // Rotating star
                    ctx.rotate(e.time * 2);
                    ctx.fillStyle = '#f1c40f';
                    ctx.shadowColor = '#f39c12';
                    ctx.shadowBlur = 5;
                    ctx.beginPath();
                    for (let i = 0; i < 5; i++) {
                        let a = (i * 4 * Math.PI) / 5 - Math.PI / 2;
                        let r = e.radius;
                        let px = Math.cos(a) * r;
                        let py = Math.sin(a) * r;
                        if (i === 0) ctx.moveTo(px, py);
                        else ctx.lineTo(px, py);
                    }
                    ctx.closePath();
                    ctx.fill();
                } else if (e.type === 'crane') {
                    // Flapping bird
                    let flap = Math.sin(e.time * 10) * 5;
                    ctx.fillStyle = '#ffffff';
                    ctx.shadowColor = 'rgba(0,0,0,0.2)';
                    ctx.shadowBlur = 5;
                    ctx.beginPath();
                    ctx.moveTo(0, -e.radius);
                    ctx.lineTo(e.radius, flap);
                    ctx.lineTo(0, e.radius * 0.5);
                    ctx.lineTo(-e.radius, flap);
                    ctx.closePath();
                    ctx.fill();
                } else if (e.type === 'frog') {
                    // simple frog shape
                    Renderer.drawWatercolorCircle(0, 0, e.radius * 0.8, '#2ecc71');
                    Renderer.drawWatercolorCircle(-e.radius * 0.5, -e.radius * 0.5, e.radius * 0.4, '#27ae60'); // eye
                    Renderer.drawWatercolorCircle(e.radius * 0.5, -e.radius * 0.5, e.radius * 0.4, '#27ae60'); // eye
                }

                ctx.restore();
            }
        }

        /**
         * GAME CORE
         */
        const Game = {
            state: 'start', // start, playing, gameover
            lastTime: 0,
            timeAlive: 0,
            score: 0,
            highScore: localStorage.getItem('boatHighScore') || 0,

            phase: 0,
            speedMult: 1,
            screenShake: 0,
            floatingTexts: [],
            rainParticles: [],

            river: new River(),
            boat: new Boat(),
            entityMgr: new EntityManager(),

            init() {
                Renderer.init(document.getElementById('gameCanvas'));
                this.boat.reset();

                // Input
                const canvas = document.getElementById('gameCanvas');
                const handleMove = (e) => {
                    if (this.state !== 'playing') return;
                    let clientX = e.touches ? e.touches[0].clientX : e.clientX;

                    // map clientX to canvas logic coordinates
                    const rect = canvas.getBoundingClientRect();
                    // The canvas width might be bounded by max-width: 500
                    let ratio = Renderer.logicWidth / rect.width;
                    let x = (clientX - rect.left) * ratio;
                    this.boat.targetX = x;
                };

                window.addEventListener('mousemove', handleMove);
                window.addEventListener('touchmove', handleMove);
                window.addEventListener('touchstart', handleMove);

                // Buttons
                document.getElementById('startBtn').addEventListener('click', () => {
                    AudioSys.init().then(() => {
                        this.startGame();
                    });
                });
                document.getElementById('restartBtn').addEventListener('click', () => {
                    this.startGame();
                });

                window.addEventListener('resize', () => Renderer.resize(canvas));

                document.getElementById('highScoreText').innerText = "Рекорд: " + this.highScore + " м";

                // Start loop
                requestAnimationFrame(t => this.loop(t));
            },

            startGame() {
                this.state = 'playing';
                this.timeAlive = 0;
                this.score = 0;
                this.phase = 0;
                this.speedMult = 1;
                this.screenShake = 0;
                this.rainParticles = [];
                this.floatingTexts = [];

                this.boat.reset();
                this.river = new River();
                this.entityMgr.reset();

                document.getElementById('startScreen').classList.add('hidden');
                document.getElementById('gameOverScreen').classList.add('hidden');
                this.updateScoreUI();

                AudioSys.setPhase(0);
                this.lastTime = performance.now();
            },

            triggerScreenFlash(color) {
                let flash = document.getElementById('flashOverlay');
                flash.style.background = color;
                flash.style.opacity = '1';
                setTimeout(() => { flash.style.opacity = '0'; }, 100);
            },

            createFloatingText(text, x, y, color) {
                this.floatingTexts.push({ text, x, y, color, life: 1, vy: -50 });
            },

            gameOver() {
                this.state = 'gameover';

                // Add current score to high score
                let finalMeters = Math.floor(this.timeAlive + this.score);
                if (finalMeters > this.highScore) {
                    this.highScore = finalMeters;
                    localStorage.setItem('boatHighScore', this.highScore);
                }

                // Explode boat
                this.entityMgr.spawnDeathParticles(this.boat.x, this.boat.y);

                setTimeout(() => {
                    document.getElementById('gameOverScreen').classList.remove('hidden');
                    document.getElementById('gameOverText').innerText = `Кораблик проплыл ${finalMeters} метров.`;
                    document.getElementById('highScoreText').innerText = "Рекорд: " + this.highScore + " м";
                    AudioSys.stop();
                }, 1500);
            },

            update(dt) {
                if (this.state !== 'playing') dt *= 0.1; // slowmo after death

                // Avoid massive jumps if tab is inactive
                if (dt > 0.1) dt = 0.1;

                if (this.state === 'playing') {
                    this.timeAlive += dt;

                    // Phase Logic
                    let targetPhase = 0;
                    if (this.timeAlive > 30) targetPhase = 1;
                    if (this.timeAlive > 90) targetPhase = 2;
                    if (this.timeAlive > 180) targetPhase = 3;
                    // Phase 4+ is just increasing difficulty
                    let phaseProgress = Math.floor(this.timeAlive / 60);
                    if (targetPhase === 3 && phaseProgress > 3) targetPhase = phaseProgress;

                    if (targetPhase > this.phase) {
                        this.phase = targetPhase;
                        AudioSys.setPhase(this.phase);
                    }

                    this.speedMult = 1 + (this.phase * 0.2);

                    // Storm FX (phase >=3)
                    if (this.phase >= 3) {
                        if (Math.random() < 0.005) { // Thunder
                            this.triggerScreenFlash('rgba(255,255,255,0.8)');
                            this.screenShake = 0.5;
                        }
                        // Add Rain
                        for (let i = 0; i < this.phase; i++) {
                            if (Math.random() < 0.2) {
                                this.rainParticles.push({
                                    x: Utils.random(0, Renderer.logicWidth + 200),
                                    y: -50,
                                    l: Utils.random(10, 30),
                                    vx: -200, vy: 500,
                                    alpha: Utils.random(0.2, 0.5)
                                });
                            }
                        }
                    }

                    // check death
                    if (this.boat.dryness <= 0) {
                        this.gameOver();
                    }
                }

                // update Rain
                for (let i = this.rainParticles.length - 1; i >= 0; i--) {
                    let p = this.rainParticles[i];
                    p.x += p.vx * dt;
                    p.y += p.vy * dt;
                    if (p.y > Renderer.logicHeight + 50) this.rainParticles.splice(i, 1);
                }

                if (this.screenShake > 0) this.screenShake -= dt;

                this.river.update(dt, this.phase, this.speedMult);
                if (this.state === 'playing') {
                    this.boat.update(dt);
                    // keep boat somewhat on water visually (soft bounds)
                }
                this.entityMgr.update(dt, this.phase, this.speedMult, this.river, this.boat);

                // UI texts
                for (let i = this.floatingTexts.length - 1; i >= 0; i--) {
                    let ft = this.floatingTexts[i];
                    ft.y += ft.vy * dt;
                    ft.life -= dt;
                    if (ft.life <= 0) this.floatingTexts.splice(i, 1);
                }

                if (this.state === 'playing' && Math.floor(this.timeAlive * 10) % 5 === 0) {
                    this.updateScoreUI();
                }
            },

            updateScoreUI() {
                let displayScore = Math.floor(this.timeAlive + this.score);
                document.getElementById('scoreVal').innerText = displayScore;
            },

            draw() {
                let ctx = Renderer.ctx;
                ctx.clearRect(0, 0, Renderer.width, Renderer.height);

                ctx.save();

                // Screenshake
                if (this.screenShake > 0) {
                    let sx = Utils.random(-1, 1) * this.screenShake * 10;
                    let sy = Utils.random(-1, 1) * this.screenShake * 10;
                    ctx.translate(sx, sy);
                }

                Renderer.drawBackground();
                this.river.draw(ctx);
                this.entityMgr.draw(ctx);

                if (this.state !== 'gameover' || this.boat.dryness > 0) {
                    this.boat.draw(ctx);
                }

                this.entityMgr.drawLeaves(ctx);

                // Draw Rain
                if (this.rainParticles.length > 0) {
                    ctx.save();
                    ctx.strokeStyle = '#ffffff';
                    ctx.lineWidth = 1;
                    ctx.beginPath();
                    for (let p of this.rainParticles) {
                        ctx.globalAlpha = p.alpha;
                        ctx.moveTo(p.x, p.y);
                        ctx.lineTo(p.x + (p.vx / p.vy) * p.l, p.y + p.l);
                    }
                    ctx.stroke();
                    ctx.restore();
                }

                // Draw floating texts
                ctx.save();
                ctx.font = 'bold 20px Georgia';
                ctx.textAlign = 'center';
                for (let ft of this.floatingTexts) {
                    ctx.globalAlpha = ft.life;
                    ctx.fillStyle = ft.color;
                    ctx.fillText(ft.text, ft.x, ft.y);
                }
                ctx.restore();

                ctx.restore();
            },

            loop(time) {
                let dt = (time - this.lastTime) / 1000;
                this.lastTime = time;

                this.update(dt);
                this.draw();

                requestAnimationFrame(t => this.loop(t));
            }
        };

        window.onload = () => Game.init();
    </script>

</body>
